<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Theme: run before any paint to avoid flash -->
    <script>(function(){var t=localStorage.getItem('colorpeek-theme-v2');if(t==='dark'){document.documentElement.classList.add('dark');}else{document.documentElement.classList.remove('dark');}})();</script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Free online color and CSS design tools for designers and developers. Color palettes, gradient generator, contrast checker, type scale, box shadow builder, and 20+ more tools." />
    <meta name="keywords" content="color tools, css tools, color palette generator, gradient generator, contrast checker, color converter, design tools online" />
    <title>ColorPeek - Free Color & CSS Design Tools Online</title>
    <meta name="robots" content="index, follow" />

    <!-- Preload LCP image (stable public URL, not hashed) -->
    <link rel="preload" as="image" href="/images/default1.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/default1.jpg" fetchpriority="high" />

    <!-- Preload the primary font subset so text renders immediately -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/inter-latin.woff2" crossorigin />

    <!-- DNS prefetch for third-party origins -->
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

    <!-- Google Analytics — defer so it never blocks rendering -->
    <script defer src="https://www.googletagmanager.com/gtag/js?id=G-GSMXWF15GP"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GSMXWF15GP', { send_page_view: false });
      window.addEventListener('load', function() { gtag('event', 'page_view'); });
    </script>

    <!-- Google AdSense — loaded 3s after page load so it never impacts LCP/TBT -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.createElement('script');
          s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8219399801950643';
          s.async = true;
          s.crossOrigin = 'anonymous';
          document.head.appendChild(s);
        }, 3000);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
