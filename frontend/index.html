<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Theme: run before any paint to avoid flash -->
    <script>(function(){var t=localStorage.getItem('colorpeek-theme-v2');if(t==='dark'){document.documentElement.classList.add('dark');}else{document.documentElement.classList.remove('dark');}})();</script>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.ico" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Extract colors from images, generate color palettes, and explore hex codes with ColorPeek - the ultimate free online color tool." />
    <meta name="keywords" content="color picker, extract color, color palette generator, hex code, image color tool, ColorPeek" />
    <title>ColorPeek - Free Color & CSS Design Tools Online</title>

    <!-- Preload LCP image (stable public URL, not hashed) -->
    <link rel="preload" as="image" href="/images/default1.webp" type="image/webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/images/default1.jpg" fetchpriority="high" />

    <!-- Google Fonts — only 4 weights (down from 7), non-blocking via preconnect + link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- All third-party scripts deferred until page is idle — never blocks TBT -->
    <script>
      function loadThirdPartyScripts() {
        // 1. Google Analytics
        var gtag_s = document.createElement('script');
        gtag_s.src = 'https://www.googletagmanager.com/gtag/js?id=G-GSMXWF15GP';
        gtag_s.async = true;
        gtag_s.onload = function() {
          window.dataLayer = window.dataLayer || [];
          window.gtag = function(){window.dataLayer.push(arguments);};
          window.gtag('js', new Date());
          window.gtag('config', 'G-GSMXWF15GP');
        };
        document.head.appendChild(gtag_s);

        // 2. Google AdSense — 2s after GTM
        setTimeout(function() {
          var ads = document.createElement('script');
          ads.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8219399801950643';
          ads.async = true;
          ads.crossOrigin = 'anonymous';
          document.head.appendChild(ads);
        }, 2000);
      }

      // Use requestIdleCallback if available (lets browser finish paint first)
      if ('requestIdleCallback' in window) {
        window.addEventListener('load', function() {
          requestIdleCallback(loadThirdPartyScripts, { timeout: 5000 });
        });
      } else {
        window.addEventListener('load', function() {
          setTimeout(loadThirdPartyScripts, 3000);
        });
      }
    </script>
  </body>
</html>
